# docker-compose para despliegue desde GHCR — sin clonar el repo.
#
# Uso:
#   1. Copiá .env.example → .env y completá los valores
#   2. docker compose -f docker-compose.ghcr.yml pull
#   3. docker compose -f docker-compose.ghcr.yml up -d
#
# Para actualizar a la última versión:
#   docker compose -f docker-compose.ghcr.yml pull && docker compose -f docker-compose.ghcr.yml up -d

services:
  app:
    image: ghcr.io/iandiduch/cuentasclaras:latest
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:8147:3000"
    volumes:
      - ./storage:/app/storage
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  worker:
    image: ghcr.io/iandiduch/cuentasclaras:latest
    restart: unless-stopped
    env_file:
      - .env
    command: ["node", "--import", "tsx", "scripts/inbox-worker.ts"]
    volumes:
      - ./storage:/app/storage
